# Guess the hidden number: a `propose` agent guesses a target in [0,1] — it is
# NEVER told the target — and a `judge` agent replies higher / lower / correct.
# A `record` step appends each guess+verdict to a shared scratchpad the guesser
# reads, so it can binary-search until it converges. Demonstrates a multi-agent
# feedback loop: counting_loop + exit_when + a shared file, target hidden from
# the guesser.
provider: { type: openrouter, model: deepseek/deepseek-v4-flash }
shared: { target: 0.62, tolerance: 0.02, feedback: "" }

workflow:
  - id: search
    type: counting_loop
    max_iterations: 12
    exit_when: "feedback == 'correct'"
    body:
      - { id: propose, type: agent, skill: propose, set: { guess: "([0-9]*\\.?[0-9]+)" } }
      - { id: judge,   type: agent, skill: judge,   set: { feedback: "(higher|lower|correct)" } }
      - id: record
        type: command
        run: "echo 'guess={{ guess }} -> {{ feedback }}' >> history.txt"
